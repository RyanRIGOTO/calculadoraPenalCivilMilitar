<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Penal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topo">
      <h1>Calculadora Penal</h1>
      <p>Selecione os delitos, aplique os redutores e gere o resultado.</p>
    </header>

    <main class="layout">
      <section class="painel painel-esquerdo">
        <div class="bloco">
          <h2>Dados</h2>

          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Digite o nome" />

          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" />
        </div>

        <div class="bloco">
          <h2>Redutores</h2>

          <label class="check">
            <input type="checkbox" id="reuPrimario" />
            <span>Réu primário</span>
          </label>

          <label class="check">
            <input type="checkbox" id="colaboracao" />
            <span>Colaboração</span>
          </label>

          <label class="check">
            <input type="checkbox" id="advogado" />
            <span>Advogado</span>
          </label>
        </div>

        <div class="bloco">
          <h2>Buscar artigo</h2>
          <input type="text" id="busca" placeholder="Buscar por artigo ou descrição" />
        </div>

        <div class="bloco resumo">
          <h2>Resumo</h2>
          <p><strong>Serviços:</strong> <span id="totalServicos">0</span> meses</p>
          <p><strong>Multa:</strong> R$ <span id="totalMulta">0,00</span></p>
          <p><strong>Fiança:</strong> R$ <span id="totalFianca">0,00</span></p>
          <p><strong>Pena reduzida:</strong> <span id="penaReduzida">0</span> meses</p>
        </div>
      </section>

      <section class="painel painel-direito">
        <div class="bloco">
          <h2>Infrações e crimes</h2>
          <div id="listaArtigos" class="lista-artigos"></div>
        </div>

        <div class="bloco acoes">
          <h2>Gerar resultado</h2>
          <div class="botoes">
            <button id="btnPrisao" type="button">Prisão</button>
            <button id="btnPenaParcial" type="button">Pena parcial</button>
            <button id="btnLiberdade" type="button">Liberdade</button>
            <button id="btnMultar" type="button">Multar</button>
          </div>
        </div>

        <div class="bloco">
          <h2>Resultado</h2>
          <textarea id="resultado" rows="12" placeholder="O texto gerado aparecerá aqui."></textarea>
          <button id="btnCopiar" type="button" class="copiar">Copiar resultado</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
